# Bootstrap: drives Consul KV namespace + /etc/carbonio/docs-connector/config.properties path
carbonio.service.name=carbonio-docs-connector

# Networking defaults (overridden by /etc/carbonio/docs-connector/config.properties at runtime)
# 127.78.0.13 is the assigned static IP for docs-connector -- matches legacy Constants.DocsConnector.DEFAULT_HOST.
networking-config.carbonio.service.host=127.78.0.13
networking-config.carbonio.service.port=10000
networking-config.carbonio.service-discover.host=127.0.0.1
networking-config.carbonio.service-discover.port=8500

# Upstreams (mesh ports 20000+ -- never direct service ports)
networking-config.carbonio.user-management.host=127.78.0.13
networking-config.carbonio.user-management.port=20001
networking-config.carbonio.files.host=127.78.0.13
networking-config.carbonio.files.port=20000
networking-config.carbonio.wopi.host=127.78.0.12
networking-config.carbonio.wopi.port=20000

# Application config defaults (overridable by Consul KV under
# carbonio-docs-connector/max-file-size-in-mb/{document|presentation|spreadsheet}).
# These mirror the legacy hard-coded limits. The Consul KV slash path is normalized to these
# dotted property keys by the bootstrap extension; ApplicationConfigService.get(...) reads them.
application-config.max-file-size-in-mb.document=50
application-config.max-file-size-in-mb.presentation=100
application-config.max-file-size-in-mb.spreadsheet=10

# gRPC client for carbonio-user-management
quarkus.grpc.clients.user-management.host=${networking-config.carbonio.user-management.host}
quarkus.grpc.clients.user-management.port=${networking-config.carbonio.user-management.port}
quarkus.grpc.clients.user-management.plain-text=true

# No gRPC server in this service
quarkus.grpc.dev-mode.force-server-start=false
quarkus.grpc.server.start-grpc-server-for-no-services=false

# REST resources are served at the ROOT path. carbonio-proxy owns the public
# "/services/docs/" prefix and STRIPS it (location /services/docs/ { proxy_pass http://docs-connector/; }),
# forwarding /files/..., /wopi/... to the connector. Do NOT set quarkus.rest.path=/services/docs:
# that double-prefixes the routes (connector would serve /services/docs/files/... but receive the
# stripped /files/...) and yields 404. The OpenAPI 'servers' below documents the public URL only.
quarkus.smallrye-openapi.servers=http://127.78.0.13:10000/services/docs

# Native image: Caffeine initializes SecureRandom at class-load, must defer to runtime
quarkus.native.additional-build-args=--initialize-at-run-time=org.apache.http.impl.auth.NTLMEngineImpl

# Native image: embed the blank office templates loaded via
# getClassLoader().getResourceAsStream("templates/empty.{docx,odt,xlsx,...}"). GraalVM does not
# bundle arbitrary classpath resources unless listed here; without this getResourceAsStream returns
# null, TemplateUtils.getTemplateRaw is empty and /files/create yields 404.
quarkus.native.resources.includes=templates/*

# Test profile
%test.quarkus.devservices.enabled=false
%test.quarkus.compose.devservices.enabled=false
%test.networking-config.carbonio.service.host=localhost
