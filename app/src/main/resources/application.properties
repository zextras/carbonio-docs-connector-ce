# Bootstrap: drives Consul KV namespace + /etc/carbonio/docs-connector/config.properties path
carbonio.service.name=carbonio-docs-connector

# Networking defaults (overridden by /etc/carbonio/docs-connector/config.properties at runtime)
# 127.78.0.13 is the assigned static IP for docs-connector -- matches legacy Constants.DocsConnector.DEFAULT_HOST.
networking-config.carbonio.service.host=127.78.0.13
networking-config.carbonio.service.port=10000
networking-config.carbonio.service-discover.host=127.0.0.1
networking-config.carbonio.service-discover.port=8500

# Upstreams (mesh ports 20000+ -- never direct service ports)
networking-config.carbonio.user-management.host=127.78.0.13
networking-config.carbonio.user-management.port=20001
networking-config.carbonio.files.host=127.78.0.13
networking-config.carbonio.files.port=20000
networking-config.carbonio.wopi.host=127.78.0.12
networking-config.carbonio.wopi.port=20000

# gRPC client for carbonio-user-management
quarkus.grpc.clients.user-management.host=${networking-config.carbonio.user-management.host}
quarkus.grpc.clients.user-management.port=${networking-config.carbonio.user-management.port}
quarkus.grpc.clients.user-management.plain-text=true

# No gRPC server in this service
quarkus.grpc.dev-mode.force-server-start=false

# REST base path: legacy is /services/docs (RestApplication @ApplicationPath)
quarkus.rest.path=/services/docs

# Test profile
%test.quarkus.devservices.enabled=false
%test.quarkus.compose.devservices.enabled=false
%test.networking-config.carbonio.service.host=localhost
